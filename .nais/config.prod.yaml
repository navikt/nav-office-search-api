---
apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: nav-office-search-api
  namespace: navno
  labels:
    team: navno
spec:
  image: {{image}}
  port: 3003
  liveness:
    path: /internal/isAlive
    initialDelay: 5
  readiness:
    path: /internal/isReady
    initialDelay: 5
  observability:
    autoInstrumentation:
      enabled: true
      runtime: nodejs
  ingresses:
    - https://nav-office-search-api.intern.nav.no
    - https://nav-office-search-api.prod-fss-pub.nais.io
  env:
    - name: NPM_CONFIG_CACHE
      value: /tmp/npm-cache
    - name: NODE_EXTRA_CA_CERTS
      value: "/etc/ssl/ca-bundle.pem"
    - name: NORG_ENHET_API
      value: https://app.adeo.no/norg2/api/v1/enhet
    - name: PDL_API
      value: https://pdl-api.intern.nav.no
  webproxy: true
  azure:
    application:
      enabled: true
  accessPolicy:
    inbound:
      rules:
        - application: nav-office-search
          namespace: navno
          cluster: prod-gcp
    outbound:
      rules:
        - application: pdl-api
          namespace: pdl
  replicas:
    min: 2
    max: 2
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 128Mi
